server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:${NF_BIRTHDAY_DB_JDBC_POSTGRES_URI:jdbc:postgresql://localhost:5432/birthday}}
    username: ${DATABASE_USERNAME:${NF_BIRTHDAY_DB_USERNAME:birthday}}
    password: ${DATABASE_PASSWORD:${NF_BIRTHDAY_DB_PASSWORD:birthday}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
  whatsapp:
    # Store these only as secret environment variables in Render.
    # Sending stays disabled until every required setting is configured.
    enabled: ${WHATSAPP_ENABLED:false}
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    template-name: ${WHATSAPP_TEMPLATE_NAME:birthday_invitation}
    template-language: ${WHATSAPP_TEMPLATE_LANGUAGE:en_US}
    template-includes-name: ${WHATSAPP_TEMPLATE_INCLUDES_NAME:true}
    api-version: ${WHATSAPP_API_VERSION:v23.0}
    admin-token: ${WHATSAPP_ADMIN_TOKEN:}
