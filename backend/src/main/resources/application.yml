server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/birthday}
    username: ${DATABASE_USERNAME:birthday}
    password: ${DATABASE_PASSWORD:birthday}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

